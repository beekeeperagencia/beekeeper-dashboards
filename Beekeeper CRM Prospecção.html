<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beekeeper CRM — Prospecção</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#18191C;--bg2:#202226;--bg3:#27292E;--bg4:#313439;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.14);
  --text:#F0EFE8;--text2:#9E9B87;--text3:#5A5850;
  --green:#2ECC71;--green-bg:rgba(46,204,113,0.12);
  --red:#E74C3C;--red-bg:rgba(231,76,60,0.12);
  --amber:#F5C518;--amber-bg:rgba(245,197,24,0.1);
  --blue:#3498DB;--blue-bg:rgba(52,152,219,0.12);
  --purple:#9B59B6;--purple-bg:rgba(155,89,182,0.12);
  --teal:#1ABC9C;--teal-bg:rgba(26,188,156,0.12);
  --orange:#E67E22;--orange-bg:rgba(230,126,34,0.12);
  --radius:14px;--radius-sm:9px;--radius-xs:6px;
  --col-width:280px;
  --shadow:0 4px 24px rgba(0,0,0,0.4);
  --shadow-lg:0 12px 48px rgba(0,0,0,0.6);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--text);font-size:14px;}
body{display:flex;flex-direction:column;overflow:hidden;}

.topbar{background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 1.25rem;height:54px;flex-shrink:0;gap:10px;flex-wrap:wrap;}
.brand{display:flex;align-items:center;gap:10px;min-width:0;}
.brand-icon{width:32px;height:32px;background:var(--amber);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.brand-name{font-family:"Syne",sans-serif;font-size:15px;font-weight:700;white-space:nowrap;}
.brand-sub{font-size:10px;color:var(--text3);white-space:nowrap;}
.save-ind{font-size:10px;color:var(--text3);margin-left:6px;white-space:nowrap;}
.topbar-right{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.btn{font-family:"DM Sans",sans-serif;font-size:12px;font-weight:500;padding:6px 12px;border-radius:var(--radius-xs);cursor:pointer;border:none;transition:all .15s;white-space:nowrap;}
.btn-ghost{background:rgba(255,255,255,0.06);color:var(--text2);border:1px solid var(--border2);}
.btn-ghost:hover{background:rgba(255,255,255,0.1);color:var(--text);}
.btn-primary{background:var(--amber);color:#0D0D0D;font-weight:700;}
.btn-primary:hover{background:#FFCF30;}

.summary-bar{display:flex;gap:8px;padding:10px 1.25rem;flex-wrap:wrap;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto;scrollbar-width:none;}
.summary-bar::-webkit-scrollbar{display:none;}
.scard{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-xs);padding:7px 13px;font-size:11px;display:flex;gap:7px;align-items:center;flex-shrink:0;white-space:nowrap;}
.scard strong{font-size:16px;font-weight:700;font-family:"Syne",sans-serif;}
.badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;}
.badge-green{background:var(--green-bg);color:var(--green);}
.badge-amber{background:var(--amber-bg);color:#E8A100;}
.badge-red{background:var(--red-bg);color:var(--red);}

.board-wrap{flex:1;overflow-x:scroll;overflow-y:auto;padding:1rem 1.25rem 1.5rem;scrollbar-width:auto;scrollbar-color:var(--amber) var(--bg3);}
.board-wrap::-webkit-scrollbar{height:9px;}
.board-wrap::-webkit-scrollbar-track{background:var(--bg3);}
.board-wrap::-webkit-scrollbar-thumb{background:var(--amber);border-radius:5px;}
.board{display:flex;gap:10px;min-width:max-content;align-items:flex-start;}

.col{width:var(--col-width);background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;}
.col.col-dragging{opacity:.4;}
.col-header{padding:11px 12px 9px;position:relative;}
.col-header::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;}
.col-name{font-family:"Syne",sans-serif;font-size:13px;font-weight:700;color:var(--text);letter-spacing:-.2px;}
.col-count{font-size:10px;color:var(--text3);margin-top:2px;}

.col-body{padding:8px;display:flex;flex-direction:column;gap:7px;overflow-y:auto;flex:1;min-height:60px;}
.col-body.drag-over{background:rgba(245,197,24,0.05);}

.lcard{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 11px;cursor:grab;transition:all .15s;border-left:3px solid transparent;}
.lcard:hover{border-color:var(--border2);box-shadow:var(--shadow);}
.lcard.dragging{opacity:.4;}
.lcard.drag-over{border-top:2px solid var(--amber);}
.lcard-top{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;margin-bottom:5px;}
.lcard-name{font-size:13px;font-weight:600;color:var(--text);line-height:1.3;flex:1;}
.lcard-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:11px;padding:0 3px;opacity:0;flex-shrink:0;transition:opacity .12s;}
.lcard:hover .lcard-del{opacity:1;}
.lcard-del:hover{color:var(--red);}
.lcard-meta{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px;}
.ltag{font-size:9px;font-weight:600;padding:2px 7px;border-radius:20px;white-space:nowrap;}
.ltag-origem{background:var(--blue-bg);color:var(--blue);}
.ltag-nicho{background:var(--purple-bg);color:var(--purple);}
.lcard-valor{font-size:12px;font-family:"DM Mono",monospace;font-weight:600;color:var(--green);margin-bottom:5px;}
.lcard-followup{display:flex;align-items:center;gap:4px;font-size:10px;padding:3px 7px;border-radius:6px;margin-top:5px;}
.lcard-followup.atrasado{background:var(--red-bg);color:var(--red);font-weight:600;}
.lcard-followup.hoje{background:var(--amber-bg);color:#E8A100;font-weight:600;}
.lcard-followup.futuro{background:var(--bg4);color:var(--text3);}
.lcard-contact-count{font-size:10px;color:var(--text3);margin-top:5px;display:flex;align-items:center;gap:3px;}
.lcard-prob{display:flex;align-items:center;gap:6px;margin-bottom:6px;}
.lcard-prob-bar{flex:1;height:4px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden;}
.lcard-prob-fill{height:100%;border-radius:3px;transition:width .3s;}
.lcard-prob-txt{font-size:9px;color:var(--text3);font-family:"DM Mono",monospace;white-space:nowrap;}
.lcard-saude{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;margin-bottom:6px;display:inline-block;cursor:pointer;transition:opacity .12s;}
.lcard-saude:hover{opacity:.8;}

.add-card-btn{margin:0 8px 8px;padding:7px 8px;border:1.5px dashed var(--border2);border-radius:var(--radius-sm);background:transparent;color:var(--text3);font-size:11px;cursor:pointer;transition:all .15s;}
.add-card-btn:hover{background:rgba(245,197,24,0.04);border-color:var(--amber);color:var(--amber);}

.add-col{width:var(--col-width);min-height:90px;background:rgba(255,255,255,0.02);border:2px dashed var(--border2);border-radius:var(--radius);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text3);font-size:12px;flex-shrink:0;transition:all .15s;}
.add-col:hover{background:rgba(245,197,24,0.04);border-color:var(--amber);color:var(--amber);}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:500;align-items:center;justify-content:center;backdrop-filter:blur(4px);padding:1rem;overflow-y:auto;}
.modal-overlay.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);padding:1.5rem;width:520px;max-width:100%;box-shadow:var(--shadow-lg);margin:auto;}
.modal-title{font-family:"Syne",sans-serif;font-size:16px;font-weight:800;margin-bottom:3px;}
.modal-sub{font-size:12px;color:var(--text3);margin-bottom:1.1rem;}
.form-group{margin-bottom:.85rem;}
.form-label{font-size:10px;font-weight:700;color:var(--text3);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:.5px;}
.form-input{width:100%;font-family:"DM Sans",sans-serif;font-size:13px;padding:8px 11px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--bg3);color:var(--text);}
.form-input:focus{outline:none;border-color:var(--amber);box-shadow:0 0 0 3px rgba(245,197,24,0.12);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.form-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:1.1rem;}

.history-list{display:flex;flex-direction:column;gap:6px;margin-bottom:10px;max-height:180px;overflow-y:auto;}
.history-item{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-xs);padding:7px 9px;font-size:11px;}
.history-item-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;}
.history-type{font-weight:700;font-size:9px;padding:1px 6px;border-radius:10px;background:var(--blue-bg);color:var(--blue);}
.history-date{color:var(--text3);font-family:"DM Mono",monospace;}
.history-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:10px;padding:0 3px;}
.history-del:hover{color:var(--red);}
.history-text{color:var(--text2);}

.section-divider{border-top:1px solid var(--border);margin:14px 0;padding-top:12px;}
.section-label{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
.anexo-item{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-xs);padding:6px 9px;font-size:11px;}
.anexo-label{font-weight:600;color:var(--text);flex-shrink:0;}
.anexo-link{color:var(--blue);text-decoration:none;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.anexo-link:hover{text-decoration:underline;}
.anexo-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:10px;padding:0 3px;flex-shrink:0;}
.anexo-del:hover{color:var(--red);}
.dup-warning{background:rgba(245,197,24,0.1);border:1px solid rgba(245,197,24,0.3);border-radius:var(--radius-sm);padding:8px 10px;font-size:11px;color:#E8A100;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.lcard-responsavel{font-size:9px;color:var(--text3);margin-top:4px;display:flex;align-items:center;gap:3px;}
.followup-today-banner{background:var(--amber-bg);border-bottom:1px solid rgba(245,197,24,0.3);padding:8px 1.25rem;font-size:12px;color:#E8A100;display:none;align-items:center;gap:8px;flex-shrink:0;}
.followup-today-banner.show{display:flex;}
.followup-today-banner b{cursor:pointer;text-decoration:underline;}

.toast{position:fixed;bottom:1.25rem;right:1.25rem;left:1.25rem;z-index:999;background:var(--bg3);color:var(--text);padding:10px 16px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;border-left:3px solid var(--amber);opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none;box-shadow:var(--shadow);text-align:center;}
@media(min-width:480px){.toast{left:auto;width:auto;text-align:left;}}
.toast.show{opacity:1;transform:translateY(0);}
[contenteditable]{outline:none;}

@media(max-width:600px){
  .topbar{height:auto;padding:8px 1rem;}
  .board-wrap{padding:.75rem .75rem 1.5rem;}
  .summary-bar{padding:8px .75rem;}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div class="brand-icon">🎯</div>
    <div>
      <div class="brand-name">Beekeeper CRM</div>
      <div class="brand-sub">Prospecção de Clientes</div>
    </div>
    <span class="save-ind" id="saveInd"></span>
  </div>
  <div class="topbar-right">
    <button class="btn btn-ghost" onclick="openAddLead()">+ Lead</button>
    <button class="btn btn-ghost" onclick="exportHTML()">↓ Exportar</button>
    <button class="btn btn-primary" id="btnSave" onclick="saveData()">💾 Salvar</button>
  </div>
</div>

<div class="followup-today-banner" id="followupBanner"></div>
<div class="summary-bar" id="summaryBar"></div>

<div class="board-wrap">
  <div class="board" id="board"></div>
</div>

<!-- MODAL: Add/Edit Lead -->
<div class="modal-overlay" id="mLead">
  <div class="modal">
    <div class="modal-title" id="mLeadTitle">Novo Lead</div>
    <div class="modal-sub" id="mLeadSub"></div>

    <div class="form-group">
      <label class="form-label">Nome da empresa</label>
      <input class="form-input" id="lNome" type="text" placeholder="Ex: Pizzaria Sabor Goiano">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Nicho</label>
        <input class="form-input" id="lNicho" type="text" placeholder="Ex: Restaurante, Clínica...">
      </div>
      <div class="form-group">
        <label class="form-label">Cidade</label>
        <input class="form-input" id="lCidade" type="text" placeholder="Ex: Goiânia">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Origem do contato</label>
        <select class="form-input" id="lOrigem">
          <option>Site</option>
          <option>Google</option>
          <option>Instagram</option>
          <option>Ligação</option>
          <option>Indicação</option>
          <option>Prospecção ativa</option>
          <option>Outro</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Responsável pelo lead</label>
        <select class="form-input" id="lResponsavel">
          <option value="">Selecione...</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Pessoa de contato</label>
        <input class="form-input" id="lContatoNome" type="text" placeholder="Ex: João (sócio)">
      </div>
      <div class="form-group">
        <label class="form-label">Telefone / WhatsApp</label>
        <input class="form-input" id="lTelefone" type="text" placeholder="(62) 9...">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Instagram</label>
        <input class="form-input" id="lInstagram" type="text" placeholder="@empresa">
      </div>
      <div class="form-group">
        <label class="form-label">&nbsp;</label>
        <div style="font-size:11px;color:var(--text3);padding-top:8px;">Use o histórico abaixo para registrar duplicidades suspeitas.</div>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Valor estimado (R$/mês)</label>
        <input class="form-input" id="lValor" type="number" step="0.01" placeholder="Ex: 1500">
      </div>
      <div class="form-group">
        <label class="form-label">Próximo follow-up</label>
        <input class="form-input" id="lFollowup" type="text" placeholder="DD/MM/AAAA">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Ângulo de abordagem / Anotação geral</label>
      <textarea class="form-input" id="lNota" rows="2" placeholder="Ex: GMN abandonado, sem fotos no perfil..."></textarea>
    </div>

    <div class="section-divider" id="templatesSection" style="display:none;">
      <div class="section-label">Templates de abordagem</div>
      <select class="form-input" id="tplSelect" onchange="aplicarTemplatePreview()" style="margin-bottom:8px;">
        <option value="">Escolher template...</option>
      </select>
      <div id="tplPreview" style="display:none;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px;font-size:12px;color:var(--text2);margin-bottom:8px;white-space:pre-wrap;"></div>
      <button class="btn btn-ghost" id="tplCopyBtn" style="display:none;width:100%;font-size:11px;" onclick="copiarTemplate()">📋 Copiar texto</button>
    </div>

    <div class="section-divider" id="anexosSection" style="display:none;">
      <div class="section-label">Anexos / Links</div>
      <div id="anexosList" style="display:flex;flex-direction:column;gap:5px;margin-bottom:8px;"></div>
      <div class="form-row">
        <input class="form-input" id="aLabel" type="text" placeholder="Ex: Proposta PDF, print conversa..." style="flex:1;">
        <input class="form-input" id="aUrl" type="text" placeholder="Link (Drive, imagem...)" style="flex:1;">
      </div>
      <button class="btn btn-ghost" style="width:100%;margin-top:6px;font-size:11px;" onclick="addAnexo()">+ Adicionar link</button>
    </div>

    <div class="section-divider" id="historySection" style="display:none;">
      <div class="section-label">Histórico de contatos</div>
      <div class="history-list" id="historyList"></div>
      <div class="form-row">
        <select class="form-input" id="hTipo" style="flex:0 0 110px;">
          <option>WhatsApp</option>
          <option>Ligação</option>
          <option>Instagram</option>
          <option>E-mail</option>
          <option>Visita</option>
        </select>
        <input class="form-input" id="hTexto" type="text" placeholder="O que foi conversado...">
      </div>
      <button class="btn btn-ghost" style="width:100%;margin-top:6px;font-size:11px;" onclick="addHistorico()">+ Adicionar ao histórico</button>
    </div>

    <div class="section-divider" id="perdidoSection" style="display:none;">
      <div class="section-label">Motivo da perda</div>
      <select class="form-input" id="lMotivoPerda" style="margin-bottom:10px;">
        <option value="">Selecione...</option>
        <option>Preço muito alto</option>
        <option>Fechou com concorrente</option>
        <option>Sem retorno / esfriou</option>
        <option>Não é o momento</option>
        <option>Não tinha orçamento</option>
        <option>Outro</option>
      </select>
      <button class="btn btn-ghost" style="width:100%;font-size:11px;border-color:var(--green);color:var(--green);" onclick="reabrirLead()">↻ Reabrir lead — voltou a demonstrar interesse</button>
    </div>

    <div class="modal-footer">
      <button class="btn btn-ghost" id="lDelBtn" style="display:none;margin-right:auto;color:var(--red);" onclick="deleteLeadFromModal()">Apagar lead</button>
      <button class="btn btn-ghost" onclick="tentarFecharLeadModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="confirmLead()">Salvar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SK = "beekeeper_crm_prospeccao_v1";

const ETAPAS = [
  { id:"captacao",  nome:"Captação",          cor:"#3498DB", prob:5,   diasMedios:3 },
  { id:"contato",    nome:"Entrei em contato", cor:"#1ABC9C", prob:15,  diasMedios:4 },
  { id:"orcamento",  nome:"Orçamento",         cor:"#E67E22", prob:35,  diasMedios:5 },
  { id:"proposta",   nome:"Envio de proposta", cor:"#9B59B6", prob:55,  diasMedios:6 },
  { id:"aprovacao",  nome:"Aprovação",         cor:"#F5C518", prob:80,  diasMedios:3 },
  { id:"contrato",   nome:"Envio de contrato", cor:"#2ECC71", prob:90,  diasMedios:3 },
  { id:"assinatura", nome:"Assinatura",        cor:"#27AE60", prob:100, diasMedios:0 },
  { id:"perdido",    nome:"Perdido",           cor:"#E74C3C", prob:0,   diasMedios:0 },
];

// Status de saúde do cliente, usado APÓS a assinatura (pós-venda / retenção)
const SAUDE_OPTS = [
  { id:"saudavel", nome:"Saudável",      cor:"#2ECC71", icone:"🟢" },
  { id:"atencao",  nome:"Em atenção",    cor:"#F5C518", icone:"🟡" },
  { id:"risco",    nome:"Risco de churn",cor:"#E74C3C", icone:"🔴" },
];

// Responsáveis disponíveis (quem cuida do lead)
const RESPONSAVEIS = ["Jonas", "Wilson", "Outro"];

// Templates de abordagem por origem — biblioteca de scripts prontos pra copiar/colar
const TEMPLATES = [
  { origem:"Instagram", titulo:"Primeiro contato — Instagram",
    texto:"Olá! Vi o perfil de vocês no Instagram e notei que [observação específica — ex: poucos posts recentes, sem destaque, fotos com qualidade baixa]. Trabalho com marketing digital local aqui em Goiânia e ajudo negócios como o seu a aparecerem mais no Google e nas redes. Posso te mostrar rapidinho o que encontrei?" },
  { origem:"Google", titulo:"Primeiro contato — GMN abandonado",
    texto:"Olá! Encontrei o perfil de vocês no Google e percebi que o cadastro está incompleto (sem fotos atualizadas / sem horário / sem categoria certa). Isso faz o negócio perder clientes que pesquisam vocês todos os dias. Posso te mostrar o que precisa ajustar?" },
  { origem:"Ligação", titulo:"Roteiro de ligação fria",
    texto:"Boa tarde, falo com [nome]? Me chamo Jonas, sou da Beekeeper, uma agência de marketing aqui de Goiânia. Estou ligando porque ajudamos negócios como o seu a aparecerem mais no Google e nas redes sociais, e queria entender rapidinho como está a presença digital de vocês hoje. Tem 2 minutos?" },
  { origem:"Indicação", titulo:"Contato via indicação",
    texto:"Olá! Tudo bem? O [nome de quem indicou] me passou seu contato, falou bem do seu negócio e comentou que vocês querem dar uma força no marketing digital. Posso te mostrar rapidinho como ajudamos negócios parecidos com o seu?" },

  ]
};

const FORM_FIELDS = ["lNome","lNicho","lCidade","lOrigem","lResponsavel","lTelefone","lInstagram","lValor","lFollowup","lNota","lMotivoPerda"];

function capturarSnapshot(){
  const snap = {};
  FORM_FIELDS.forEach(id=>{
    const el = document.getElementById(id);
    if(el) snap[id] = el.value;
  });
  return JSON.stringify(snap);
}

function formFoiAlterado(){
  if(formSnapshot===null) return false;
  return capturarSnapshot() !== formSnapshot;
}

// Tenta fechar o modal de lead — se houver alterações não salvas, pede confirmação antes
function tentarFecharLeadModal(){
  if(formFoiAlterado()){
    const ok = confirm("Você tem alterações não salvas neste lead.\n\nDeseja realmente sair sem salvar?");
    if(!ok) return; // mantém o modal aberto
  }
  closeModal("mLead");
}

// ── HELPERS ──
function getEtapa(id){ return ETAPAS.find(e=>e.id===id) || ETAPAS[0]; }
function leadsDaEtapa(etapaId){ return S.leads.filter(l=>l.etapa===etapaId); }
function fmt(v){ return "R$ " + Number(v||0).toLocaleString("pt-BR",{minimumFractionDigits:0,maximumFractionDigits:0}); }

function parseData(str){
  if(!str) return null;
  const p = str.split("/");
  if(p.length<3) return null;
  return new Date(+p[2], +p[1]-1, +p[0]);
}
function diasParaFollowup(str){
  const d = parseData(str);
  if(!d) return null;
  const hoje = new Date(); hoje.setHours(0,0,0,0);
  d.setHours(0,0,0,0);
  return Math.round((d-hoje)/(1000*60*60*24));
}

// ── SUMMARY ──
function renderSummary(){
  const total = S.leads.length;
  const ativosLeads = S.leads.filter(l=>l.etapa!=="perdido" && l.etapa!=="assinatura");
  const ativos = ativosLeads.length;
  const fechados = S.leads.filter(l=>l.etapa==="assinatura").length;
  const perdidos = S.leads.filter(l=>l.etapa==="perdido").length;
  const valorPotencial = ativosLeads.reduce((a,l)=>a+(l.valor||0),0);

  // Previsão ponderada pela probabilidade de cada etapa (forecast realista)
  const previsaoPonderada = ativosLeads.reduce((a,l)=>{
    const etapa = getEtapa(l.etapa);
    return a + (l.valor||0) * (etapa.prob/100);
  },0);

  const atrasados = S.leads.filter(l=>{
    if(l.etapa==="perdido"||l.etapa==="assinatura"||!l.followup) return false;
    const d = diasParaFollowup(l.followup);
    return d!==null && d<0;
  }).length;

  const parados = ativosLeads.filter(l=>{
    const st = statusTempoEtapa(l);
    return st && st.nivel==="critico";
  }).length;

  const clientesRisco = S.leads.filter(l=>l.etapa==="assinatura" && l.saude==="risco").length;

  document.getElementById("summaryBar").innerHTML = `
    <div class="scard"><strong>${total}</strong><span style="color:var(--text2)">Leads totais</span></div>
    <div class="scard"><strong style="color:var(--blue)">${ativos}</strong><span style="color:var(--text2)">Em andamento</span></div>
    <div class="scard"><strong style="color:var(--green)">${fechados}</strong><span style="color:var(--text2)">Fechados</span><span class="badge badge-green">✓</span></div>
    <div class="scard"><strong style="color:var(--red)">${perdidos}</strong><span style="color:var(--text2)">Perdidos</span></div>
    <div class="scard" style="border-left:2px solid var(--amber);"><strong style="color:var(--amber)">${fmt(valorPotencial)}</strong><span style="color:var(--text2)">Potencial bruto/mês</span></div>
    <div class="scard" style="border-left:2px solid var(--purple);"><strong style="color:var(--purple)">${fmt(previsaoPonderada)}</strong><span style="color:var(--text2)">Previsão realista/mês</span></div>
    ${atrasados>0?`<div class="scard"><strong style="color:var(--red)">${atrasados}</strong><span style="color:var(--text2)">Follow-up atrasado</span><span class="badge badge-red">⚠️</span></div>`:""}
    ${parados>0?`<div class="scard"><strong style="color:var(--red)">${parados}</strong><span style="color:var(--text2)">Parado(s) na etapa</span><span class="badge badge-red">⏱</span></div>`:""}
    ${clientesRisco>0?`<div class="scard"><strong style="color:var(--red)">${clientesRisco}</strong><span style="color:var(--text2)">Cliente(s) em risco</span><span class="badge badge-red">🔴</span></div>`:""}
  `;
}

// ── BOARD ──
function renderBoard(){
  const board = document.getElementById("board");
  board.innerHTML = "";

  ETAPAS.forEach(etapa=>{
    const leads = leadsDaEtapa(etapa.id);

    const col = document.createElement("div");
    col.className = "col";
    col.dataset.etapa = etapa.id;

    const hdr = document.createElement("div");
    hdr.className = "col-header";
    hdr.style.borderBottom = "1px solid " + etapa.cor + "33";
    hdr.querySelector;
    hdr.innerHTML = `
      <div style="position:absolute;top:0;left:0;right:0;height:3px;background:${etapa.cor};"></div>
      <div class="col-name">${etapa.nome}</div>
      <div class="col-count">${leads.length} lead${leads.length!==1?"s":""}</div>
    `;
    col.appendChild(hdr);

    const body = document.createElement("div");
    body.className = "col-body";
    body.dataset.etapa = etapa.id;

    leads.forEach(lead=>{
      const card = document.createElement("div");
      card.className = "lcard";
      card.draggable = true;
      card.dataset.id = lead.id;
      card.style.borderLeftColor = etapa.cor;

      let followupHtml = "";
      if(lead.followup && etapa.id!=="perdido" && etapa.id!=="assinatura"){
        const dias = diasParaFollowup(lead.followup);
        let cls = "futuro", txt = lead.followup;
        if(dias!==null){
          if(dias<0){ cls="atrasado"; txt = "Atrasado " + Math.abs(dias) + "d — " + lead.followup; }
          else if(dias===0){ cls="hoje"; txt = "Follow-up hoje!"; }
          else { txt = "Follow-up em " + dias + "d (" + lead.followup + ")"; }
        }
        followupHtml = `<div class="lcard-followup ${cls}">📅 ${txt}</div>`;
      }

      let motivoHtml = "";
      if(etapa.id==="perdido" && lead.motivoPerda){
        motivoHtml = `<div class="lcard-followup atrasado">✕ ${lead.motivoPerda}</div>`;
      }

      // Tempo parado na etapa (não exibe em Assinatura/Perdido, que são etapas finais)
      let tempoHtml = "";
      if(etapa.id!=="assinatura" && etapa.id!=="perdido"){
        const st = statusTempoEtapa(lead);
        if(st && st.nivel!=="ok"){
          const cls = st.nivel==="critico" ? "atrasado" : "hoje";
          tempoHtml = `<div class="lcard-followup ${cls}">⏱ ${st.dias}d nesta etapa (média: ${etapa.diasMedios}d)</div>`;
        }
      }

      // Probabilidade de fechamento (não exibe em etapas finais)
      let probHtml = "";
      if(etapa.id!=="assinatura" && etapa.id!=="perdido"){
        probHtml = `<div class="lcard-prob">
          <div class="lcard-prob-bar"><div class="lcard-prob-fill" style="width:${etapa.prob}%;background:${etapa.cor}"></div></div>
          <span class="lcard-prob-txt">${etapa.prob}% chance</span>
        </div>`;
      }

      // Saúde do cliente (só exibe quando já fechado / em Assinatura)
      let saudeHtml = "";
      if(etapa.id==="assinatura"){
        const sa = SAUDE_OPTS.find(s=>s.id===(lead.saude||"saudavel")) || SAUDE_OPTS[0];
        saudeHtml = `<div class="lcard-saude" data-leadid="${lead.id}" style="background:${sa.cor}22;color:${sa.cor};border:1px solid ${sa.cor}55;" title="Clique para mudar o status de saúde">${sa.icone} ${sa.nome}</div>`;
      }

      card.innerHTML = `
        <div class="lcard-top">
          <span class="lcard-name">${lead.nome}</span>
          <button class="lcard-del" onclick="event.stopPropagation();deleteLead('${lead.id}')">✕</button>
        </div>
        <div class="lcard-meta">
          ${lead.nicho?`<span class="ltag ltag-nicho">${lead.nicho}</span>`:""}
          ${lead.origem?`<span class="ltag ltag-origem">${lead.origem}</span>`:""}
        </div>
        ${lead.valor>0?`<div class="lcard-valor">${fmt(lead.valor)}/mês</div>`:""}
        ${probHtml}
        ${saudeHtml}
        ${followupHtml}
        ${tempoHtml}
        ${motivoHtml}
        ${lead.historico&&lead.historico.length>0?`<div class="lcard-contact-count">💬 ${lead.historico.length} contato${lead.historico.length!==1?"s":""}</div>`:""}
        ${lead.anexos&&lead.anexos.length>0?`<div class="lcard-contact-count">📎 ${lead.anexos.length} link${lead.anexos.length!==1?"s":""}</div>`:""}
        ${lead.responsavel?`<div class="lcard-responsavel">👤 ${lead.responsavel}</div>`:""}
      `;

      card.addEventListener("click", ()=>openEditLead(lead.id));

      const saudeBadge = card.querySelector(".lcard-saude");
      if(saudeBadge){
        saudeBadge.addEventListener("click", e=>{
          e.stopPropagation();
          cycleSaude(lead.id);
        });
      }

      card.addEventListener("dragstart", e=>{
        dragSrcId = lead.id;
        card.classList.add("dragging");
        e.dataTransfer.effectAllowed = "move";
      });
      card.addEventListener("dragend", ()=>{
        card.classList.remove("dragging");
        document.querySelectorAll(".drag-over").forEach(el=>el.classList.remove("drag-over"));
      });
      card.addEventListener("dragover", e=>{
        e.preventDefault();
        document.querySelectorAll(".lcard.drag-over").forEach(el=>el.classList.remove("drag-over"));
        card.classList.add("drag-over");
      });
      card.addEventListener("dragleave", ()=>card.classList.remove("drag-over"));
      card.addEventListener("drop", e=>{
        e.preventDefault(); e.stopPropagation();
        card.classList.remove("drag-over");
        moveLeadToEtapa(dragSrcId, etapa.id);
      });

      body.appendChild(card);
    });

    body.addEventListener("dragover", e=>{ e.preventDefault(); body.classList.add("drag-over"); });
    body.addEventListener("dragleave", e=>{ if(!body.contains(e.relatedTarget)) body.classList.remove("drag-over"); });
    body.addEventListener("drop", e=>{
      e.preventDefault();
      body.classList.remove("drag-over");
      if(e.target.closest(".lcard")) return;
      moveLeadToEtapa(dragSrcId, etapa.id);
    });

    col.appendChild(body);

    const addBtn = document.createElement("button");
    addBtn.className = "add-card-btn";
    addBtn.textContent = "+ Lead";
    addBtn.onclick = ()=>openAddLead(etapa.id);
    col.appendChild(addBtn);

    board.appendChild(col);
  });
}

function moveLeadToEtapa(leadId, etapaId){
  const lead = S.leads.find(l=>l.id===leadId);
  if(!lead || lead.etapa===etapaId) return;
  const etapaAnterior = lead.etapa;
  lead.etapa = etapaId;
  lead.entrouNaEtapaEm = new Date().toISOString();

  // Guarda em qual etapa estava antes de ser marcado como perdido,
  // assim a reabertura sabe para onde voltar.
  if(etapaId === "perdido"){
    lead.etapaAntesDoPerdido = etapaAnterior;
  }

  // Graduação automática: ao entrar em "Assinatura", inicia o ciclo pós-venda
  if(etapaId === "assinatura" && etapaAnterior !== "assinatura"){
    if(!lead.saude) lead.saude = "saudavel";
    if(!lead.fechadoEm) lead.fechadoEm = new Date().toISOString();
    autoSave(); render();
    showToast("🎉 " + lead.nome + " fechado! Cliente entrou no acompanhamento de retenção.");
    return;
  }

  autoSave(); render();
  showToast("✓ Movido para " + getEtapa(etapaId).nome);
}

// ── BANNER DE FOLLOW-UP DE HOJE ──
function renderFollowupBanner(){
  const banner = document.getElementById("followupBanner");
  const hojeLeads = S.leads.filter(l=>{
    if(l.etapa==="perdido"||l.etapa==="assinatura"||!l.followup) return false;
    return diasParaFollowup(l.followup)===0;
  });
  if(hojeLeads.length===0){ banner.classList.remove("show"); return; }
  const nomes = hojeLeads.map(l=>`<b onclick="openEditLead('${l.id}')">${l.nome}</b>`).join(", ");
  banner.innerHTML = "📅 Follow-up de hoje: " + nomes;
  banner.classList.add("show");
}

// ── TEMPO PARADO NA ETAPA ──
function diasNaEtapa(lead){
  const desde = lead.entrouNaEtapaEm || lead.criadoEm;
  if(!desde) return 0;
  const d = new Date(desde);
  const hoje = new Date();
  return Math.floor((hoje - d) / (1000*60*60*24));
}
function statusTempoEtapa(lead){
  const etapa = getEtapa(lead.etapa);
  if(!etapa.diasMedios || etapa.diasMedios===0) return null;
  const dias = diasNaEtapa(lead);
  if(dias > etapa.diasMedios * 1.5) return {nivel:"critico", dias};
  if(dias > etapa.diasMedios) return {nivel:"atencao", dias};
  return {nivel:"ok", dias};
}

function cycleSaude(leadId){
  const lead = S.leads.find(l=>l.id===leadId);
  if(!lead) return;
  const ids = SAUDE_OPTS.map(s=>s.id);
  const cur = lead.saude || "saudavel";
  const next = ids[(ids.indexOf(cur)+1) % ids.length];
  lead.saude = next;
  autoSave(); render();
  showToast(SAUDE_OPTS.find(s=>s.id===next).icone + " " + lead.nome + ": " + SAUDE_OPTS.find(s=>s.id===next).nome);
}

// Preenche o select de templates conforme a origem escolhida
function popularTemplates(origemAtual){
  const sel = document.getElementById("tplSelect");
  const relevantes = TEMPLATES.filter(t=>t.origem===origemAtual || t.origem==="Geral");
  sel.innerHTML = '<option value="">Escolher template...</option>' +
    relevantes.map((t,i)=>{
      const idxGlobal = TEMPLATES.indexOf(t);
      return `<option value="${idxGlobal}">${t.titulo}</option>`;
    }).join("");
  document.getElementById("tplPreview").style.display = "none";
  document.getElementById("tplCopyBtn").style.display = "none";

function aplicarTemplatePreview(){
  const idx = document.getElementById("tplSelect").value;
  const preview = document.getElementById("tplPreview");
  const copyBtn = document.getElementById("tplCopyBtn");
  if(idx===""){ preview.style.display="none"; copyBtn.style.display="none"; return; }
  const tpl = TEMPLATES[+idx];
  preview.textContent = tpl.texto;
  preview.style.display = "block";
  copyBtn.style.display = "block";
}

function copiarTemplate(){
  const idx = document.getElementById("tplSelect").value;
  if(idx==="") return;
  const texto = TEMPLATES[+idx].texto;
  navigator.clipboard.writeText(texto).then(()=>{
    showToast("✓ Texto copiado! Cole no WhatsApp/Instagram.");
  }).catch(()=>{
    showToast("Não foi possível copiar automaticamente — selecione e copie manualmente.");
  });
}

// ── ANEXOS ──
function renderAnexos(lead){
  const list = document.getElementById("anexosList");
  const anexos = (lead && lead.anexos) || [];
  if(anexos.length===0){
    list.innerHTML = `<div style="font-size:11px;color:var(--text3);text-align:center;padding:4px;">Nenhum link adicionado.</div>`;
    return;
  }
  list.innerHTML = anexos.map((a,i)=>`
    <div class="anexo-item">
      <span class="anexo-label">${a.label}</span>
      <a class="anexo-link" href="${a.url}" target="_blank" rel="noopener">${a.url}</a>
      <button class="anexo-del" onclick="delAnexo(${i})">✕</button>
    </div>`).join("");
}
function addAnexo(){
  if(!pendLeadId){ showToast("Salve o lead primeiro para adicionar anexos."); return; }
  const lead = S.leads.find(l=>l.id===pendLeadId);
  if(!lead) return;
  const label = document.getElementById("aLabel").value.trim();
  const url = document.getElementById("aUrl").value.trim();
  if(!label || !url){ showToast("Preencha a descrição e o link."); return; }
  if(!lead.anexos) lead.anexos = [];
  lead.anexos.push({label, url});
  document.getElementById("aLabel").value = "";
  document.getElementById("aUrl").value = "";
  autoSave();
  renderAnexos(lead);
  render();
  showToast("✓ Link adicionado!");
}
function delAnexo(idx){
  const lead = S.leads.find(l=>l.id===pendLeadId);
  if(!lead) return;
  lead.anexos.splice(idx,1);
  autoSave();
  renderAnexos(lead);
  render();
}

// ── DUPLICIDADE ──
function verificarDuplicidade(nome, excluirId){
  const nomeNorm = nome.trim().toLowerCase();
  if(!nomeNorm) return null;
  return S.leads.find(l=>
    l.id!==excluirId &&
    l.etapa!=="perdido" &&
    l.nome.trim().toLowerCase()===nomeNorm
  );
}

// ── REABERTURA DE LEAD PERDIDO ──
function reabrirLead(){
  if(!pendLeadId) return;
  const lead = S.leads.find(l=>l.id===pendLeadId);
  if(!lead) return;
  const etapaDestino = lead.etapaAntesDoPerdido || "contato";
  lead.etapa = etapaDestino;
  lead.entrouNaEtapaEm = new Date().toISOString();
  if(!lead.historico) lead.historico = [];
  const hoje = new Date();
  const dataStr = String(hoje.getDate()).padStart(2,"0")+"/"+String(hoje.getMonth()+1).padStart(2,"0")+"/"+hoje.getFullYear();
  lead.historico.push({tipo:"Reabertura", texto:"Lead reaberto — voltou a demonstrar interesse.", data:dataStr});
  formSnapshot = null;
  closeModal("mLead");
  autoSave(); render();
  showToast("✓ " + lead.nome + " reaberto em \"" + getEtapa(etapaDestino).nome + "\"!");
}

function renderHistorico(lead){
  const list = document.getElementById("historyList");
  if(!lead.historico || lead.historico.length===0){
    list.innerHTML = `<div style="font-size:11px;color:var(--text3);text-align:center;padding:8px;">Nenhum contato registrado ainda.</div>`;
    return;
  }
  list.innerHTML = lead.historico.slice().reverse().map((h,ri)=>{
    const i = lead.historico.length - 1 - ri;
    return `<div class="history-item">
      <div class="history-item-top">
        <span class="history-type">${h.tipo}</span>
        <span class="history-date">${h.data}</span>
        <button class="history-del" onclick="delHistorico('${lead.id}',${i})">✕</button>
      </div>
      <div class="history-text">${h.texto}</div>
    </div>`;
  }).join("");
}

function addHistorico(){
  if(!pendLeadId){ showToast("Salve o lead primeiro para adicionar histórico."); return; }
  const lead = S.leads.find(l=>l.id===pendLeadId);
  if(!lead) return;
  const texto = document.getElementById("hTexto").value.trim();
  if(!texto){ showToast("Descreva o contato."); return; }
  if(!lead.historico) lead.historico = [];
  const hoje = new Date();
  const dataStr = String(hoje.getDate()).padStart(2,"0")+"/"+String(hoje.getMonth()+1).padStart(2,"0")+"/"+hoje.getFullYear();
  lead.historico.push({ tipo: document.getElementById("hTipo").value, texto, data: dataStr });
  document.getElementById("hTexto").value = "";
  autoSave();
  renderHistorico(lead);
  render();
  showToast("✓ Contato registrado!");
}
function delHistorico(leadId, idx){
  const lead = S.leads.find(l=>l.id===leadId);
  if(!lead) return;
  lead.historico.splice(idx,1);
  autoSave();
  renderHistorico(lead);
  render();
}

function confirmLead(){
  const nome = document.getElementById("lNome").value.trim();
  if(!nome){ showToast("Informe o nome da empresa."); return; }

  // Checagem de duplicidade — apenas avisa, não bloqueia
  const dup = verificarDuplicidade(nome, pendLeadId);
  if(dup){
    const seguir = confirm(
      "⚠ Já existe um lead chamado \"" + dup.nome + "\" na etapa \"" + getEtapa(dup.etapa).nome + "\".\n\n" +
      "Deseja salvar mesmo assim (pode ser empresa diferente com nome parecido)?"
    );
    if(!seguir) return;
  }

  const data = {
    nome,
    nicho: document.getElementById("lNicho").value.trim(),
    cidade: document.getElementById("lCidade").value.trim(),
    origem: document.getElementById("lOrigem").value,
    responsavel: document.getElementById("lResponsavel").value,
    contatoNome: document.getElementById("lContatoNome").value.trim(),
    telefone: document.getElementById("lTelefone").value.trim(),
    instagram: document.getElementById("lInstagram").value.trim(),
    valor: parseFloat(document.getElementById("lValor").value)||0,
    followup: document.getElementById("lFollowup").value.trim(),
    nota: document.getElementById("lNota").value.trim(),
    motivoPerda: document.getElementById("lMotivoPerda").value,
  };

  if(pendLeadId===null){
    data.id = "l_"+Date.now();
    data.etapa = window.__pendEtapaInicial || "captacao";
    data.historico = [];
    data.anexos = [];
    data.criadoEm = new Date().toISOString();
    data.entrouNaEtapaEm = new Date().toISOString();
    S.leads.push(data);
    showToast("✓ Lead criado!");
  } else {
    const lead = S.leads.find(l=>l.id===pendLeadId);
    Object.assign(lead, data);
    showToast("✓ Lead atualizado!");
  }

  formSnapshot = null; // já salvo — não há mais nada "não salvo" a perder
  closeModal("mLead");
  autoSave(); render();
}

function deleteLead(id){
  if(!confirm("Apagar este lead?")) return;
  S.leads = S.leads.filter(l=>l.id!==id);
  autoSave(); render();
  showToast("Lead apagado.");
}
function deleteLeadFromModal(){
  if(!pendLeadId) return;
  if(!confirm("Apagar este lead?")) return;
  S.leads = S.leads.filter(l=>l.id!==pendLeadId);
  formSnapshot = null;
  closeModal("mLead");
  autoSave(); render();
  showToast("Lead apagado.");
}

// Show motivoPerda section dynamically if user picks "Perdido" stage via select in future,
// or it's already shown when editing a lead already in 'perdido'.

// ── MODAL ──
function openModal(id){ document.getElementById(id).classList.add("open"); }
function closeModal(id){
  document.getElementById(id).classList.remove("open");
  pendLeadId = null;
  if(id==="mLead") formSnapshot = null;
}
document.querySelectorAll(".modal-overlay").forEach(el=>el.addEventListener("click",e=>{
  if(e.target!==el) return;
  if(el.id==="mLead"){
    tentarFecharLeadModal();
  } else {
    el.classList.remove("open");
  }
}));

// ── SAVE / LOAD / EXPORT ──
function saveData(){
  try{
    const json = JSON.stringify(S);
    localStorage.setItem(SK, json);
    const check = localStorage.getItem(SK);
    if(!check || check.length!==json.length){
      showToast("⚠ Falha ao confirmar salvamento.");
      return;
    }
    const now = new Date().toLocaleString("pt-BR");
    document.getElementById("saveInd").textContent = "✓ "+now;
    document.getElementById("btnSave").style.background = "#1A7A4A";
    document.getElementById("btnSave").style.color = "#fff";
    setTimeout(()=>{document.getElementById("btnSave").style.background="";document.getElementById("btnSave").style.color="";},2000);
    showToast("✓ Dados salvos!");
  }catch(e){ showToast("⚠ Erro: "+e.message); }
}
function autoSave(){
  try{
    localStorage.setItem(SK, JSON.stringify(S));
    document.getElementById("saveInd").textContent = "● "+new Date().toLocaleTimeString("pt-BR");
  }catch(e){}
}
function loadData(){
  try{
    const raw = localStorage.getItem(SK);
    if(!raw) return false;
    const p = JSON.parse(raw);
    if(p && p.leads){ S = p; return true; }
  }catch(e){}
  return false;
}
function exportHTML(){
  let h = document.documentElement.outerHTML;
  h = h.replace(/<script>window\.__SK__=\{.*?\};<\/script>/gs, "");
  const inj = "<script>window.__SK__="+JSON.stringify(S)+";<\/script>";
  h = h.replace("</head>", inj+"</head>");
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([h],{type:"text/html;charset=utf-8;"}));
  a.download = "beekeeper_crm_prospeccao_SALVO.html"; a.click();
  showToast("✓ HTML exportado!");
}

// ── TOAST ──
function showToast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2500);
}

// ── RENDER ──
function render(){
  renderFollowupBanner();
  renderSummary();
  renderBoard();
}

// ── INIT ──
// Prioridade: localStorage (mais recente) > __SK__ embutido > DEFAULT
const carregouDoLocal = loadData();
if(!carregouDoLocal && window.__SK__){
  S = window.__SK__;
}
if(!S.leads) S.leads = [];
S.leads.forEach(l=>{ if(!l.historico) l.historico=[]; if(!l.anexos) l.anexos=[]; });
try{ localStorage.setItem(SK, JSON.stringify(S)); }catch(e){}
render();
</script>
